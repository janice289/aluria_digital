  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  font-display: swap;\n  src: url(\"8b9c7bee-fd94-43ec-9f3f-0d39c95fefd7\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Mulish';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"22585b44-abaf-4c86-9340-8f9a2aa7704f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n  <style>/* ============================================================\n   ALURIA DIGITAL — COLOR TOKENS\n   Sólido siempre. Sin degradados. La elegancia viene del\n   espacio y el contraste, no de efectos.\n   Proporción de uso ≈ 60% blanco suave/arena · 25% navy · 15% turquesa\n   ============================================================ */\n\n:root {\n  /* ---- Primarios ---- */\n  --navy-midnight: #0E2A40;   /* Navy Medianoche — autoridad, base de texto/fondo */\n  --teal-aluria:   #138A87;   /* Turquesa Aluria — claridad, acento y acción */\n  --teal-light:    #3FC2B6;   /* Turquesa Claro — acentos sobre navy, detalles luminosos */\n\n  /* ---- Neutros cálidos ---- */\n  --soft-white:    #F8F6F1;   /* Blanco Suave — fondo principal */\n  --sand:          #E7DFD2;   /* Arena — superficies secundarias */\n  --stone:         #D8CDBC;   /* Piedra — bordes cálidos, divisores */\n  --warm-gray:     #A89F92;   /* Gris Cálido — texto terciario, metadatos */\n  --ink:           #1E2D36;   /* Tinta — texto sobre fondos claros */\n\n  /* ---- Escala navy (derivada para profundidad y estados) ---- */\n  --navy-900: #081B2A;\n  --navy-800: #0E2A40;   /* = navy-midnight */\n  --navy-700: #163850;\n  --navy-600: #234B66;\n  --navy-500: #335A78;\n\n  /* ---- Escala turquesa ---- */\n  --teal-700: #0F6F6C;\n  --teal-600: #138A87;   /* = teal-aluria */\n  --teal-500: #1FA39E;\n  --teal-400: #3FC2B6;   /* = teal-light */\n  --teal-200: #B8E6E0;\n  --teal-050: #E6F4F2;\n\n  /* ---- Escala arena/blanco ---- */\n  --paper-0:  #FFFFFF;\n  --paper-50: #FCFBF8;\n  --paper-100:#F8F6F1;   /* = soft-white */\n  --paper-200:#EFEAE0;\n  --paper-300:#E7DFD2;   /* = sand */\n  --paper-400:#D8CDBC;   /* = stone */\n  --paper-500:#C4B8A4;\n\n  /* ---- Semánticos / de estado ---- */\n  --color-success:  #2E7D6B;\n  --color-success-bg: #E6F4F0;\n  --color-warning:  #B8842E;\n  --color-warning-bg: #F7EFDF;\n  --color-danger:   #B0473E;\n  --color-danger-bg: #F6E7E4;\n  --color-info:     #138A87;\n  --color-info-bg:  #E6F4F2;\n\n  /* ============================================================\n     ALIASES SEMÁNTICOS — usar estos en componentes\n     ============================================================ */\n\n  /* Superficies */\n  --surface-page:     var(--soft-white);   /* fondo de página por defecto */\n  --surface-raised:   var(--paper-0);       /* tarjetas, paneles elevados */\n  --surface-sunken:   var(--sand);          /* secciones hundidas, bandas */\n  --surface-inverse:  var(--navy-midnight); /* bloques navy a contraste */\n  --surface-accent:   var(--teal-aluria);   /* superficies de acento */\n\n  /* Texto */\n  --text-strong:   var(--navy-midnight);    /* titulares */\n  --text-body:     var(--ink);              /* párrafos */\n  --text-muted:    var(--warm-gray);        /* metadatos, captions */\n  --text-on-dark:  var(--soft-white);       /* texto sobre navy/teal */\n  --text-on-dark-muted: #9DB2C0;            /* secundario sobre navy */\n  --text-accent:   var(--teal-aluria);      /* enlaces, énfasis de acción */\n  --text-accent-on-dark: var(--teal-light); /* acento sobre navy */\n\n  /* Bordes y divisores */\n  --border-soft:   var(--stone);            /* divisores cálidos sutiles */\n  --border-strong: var(--navy-midnight);    /* contornos definidos */\n  --border-accent: var(--teal-aluria);\n  --border-faint:  #EDE6DA;\n\n  /* Acciones */\n  --action-primary:        var(--navy-midnight);\n  --action-primary-hover:  var(--navy-700);\n  --action-primary-press:  var(--navy-900);\n  --action-accent:         var(--teal-aluria);\n  --action-accent-hover:   var(--teal-700);\n  --action-accent-press:   #0C5A57;\n\n  /* Focus */\n  --focus-ring: var(--teal-aluria);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   ALURIA DIGITAL — TIPOGRAFÍA\n   Display : Cormorant Garamond — titulares, citas, cifras\n   Labels  : Jost — eyebrows, navegación, datos (tracking amplio)\n   Body/UI : Mulish — párrafos, interfaz\n   Carácter editorial del serif + claridad funcional en pantalla.\n   ============================================================ */\n\n:root {\n  /* ---- Familias ---- */\n  --font-display: 'Cormorant Garamond', 'Cormorant', Georgia, 'Times New Roman', serif;\n  --font-label:   'Jost', 'Futura', 'Century Gothic', system-ui, sans-serif;\n  --font-body:    'Mulish', system-ui, -apple-system, 'Segoe UI', sans-serif;\n\n  /* ---- Pesos ---- */\n  --weight-display-regular: 400;\n  --weight-display-medium:  500;\n  --weight-display-semibold:600;\n  --weight-display-bold:    700;\n  --weight-label-light:  300;\n  --weight-label-regular:400;\n  --weight-label-medium: 500;\n  --weight-label-semibold:600;\n  --weight-body-light:  300;\n  --weight-body-regular:400;\n  --weight-body-medium: 500;\n  --weight-body-semibold:600;\n  --weight-body-bold:   700;\n\n  /* ---- Escala tipográfica (rem, base 16px) ---- */\n  --text-2xs:  0.6875rem;  /* 11px — micro-labels */\n  --text-xs:   0.75rem;    /* 12px — eyebrows, captions */\n  --text-sm:   0.875rem;   /* 14px — UI secundaria */\n  --text-base: 1rem;       /* 16px — cuerpo */\n  --text-md:   1.125rem;   /* 18px — cuerpo destacado / lead */\n  --text-lg:   1.375rem;   /* 22px */\n  --text-xl:   1.75rem;    /* 28px */\n  --text-2xl:  2.25rem;    /* 36px */\n  --text-3xl:  3rem;       /* 48px */\n  --text-4xl:  3.75rem;    /* 60px */\n  --text-5xl:  4.75rem;    /* 76px — display hero */\n  --text-6xl:  6rem;       /* 96px — display XXL */\n\n  /* ---- Altura de línea ---- */\n  --leading-tight:   1.05;  /* titulares display grandes */\n  --leading-snug:    1.18;  /* titulares medios */\n  --leading-normal:  1.4;\n  --leading-relaxed: 1.65;  /* párrafos largos */\n\n  /* ---- Tracking ---- */\n  --tracking-display: -0.01em;  /* serif ligeramente cerrado */\n  --tracking-tight:   -0.02em;\n  --tracking-normal:  0;\n  --tracking-label:   0.16em;   /* eyebrows / Jost en mayúsculas */\n  --tracking-wide:    0.24em;   /* etiquetas muy espaciadas */\n\n  /* ============================================================\n     ROLES SEMÁNTICOS\n     ============================================================ */\n  --type-eyebrow-family: var(--font-label);\n  --type-eyebrow-size:   var(--text-xs);\n  --type-eyebrow-weight: var(--weight-label-medium);\n  --type-eyebrow-track:  var(--tracking-label);\n\n  --type-display-family: var(--font-display);\n  --type-display-weight: var(--weight-display-medium);\n  --type-display-leading:var(--leading-tight);\n\n  --type-heading-family: var(--font-display);\n  --type-heading-weight: var(--weight-display-semibold);\n\n  --type-body-family:    var(--font-body);\n  --type-body-size:      var(--text-base);\n  --type-body-leading:   var(--leading-relaxed);\n\n  --type-ui-family:      var(--font-body);\n  --type-ui-weight:      var(--weight-body-semibold);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   ALURIA DIGITAL — ESPACIADO, RADIOS, SOMBRAS, BORDES\n   \"Jerarquía generosa. El espacio en blanco guía la mirada\n   y transmite calma.\" El espacio es parte del lujo.\n   ============================================================ */\n\n:root {\n  /* ---- Escala de espaciado (base 4px, generosa) ---- */\n  --space-0:   0;\n  --space-1:   0.25rem;   /* 4 */\n  --space-2:   0.5rem;    /* 8 */\n  --space-3:   0.75rem;   /* 12 */\n  --space-4:   1rem;      /* 16 */\n  --space-5:   1.5rem;    /* 24 */\n  --space-6:   2rem;      /* 32 */\n  --space-7:   2.5rem;    /* 40 */\n  --space-8:   3rem;      /* 48 */\n  --space-9:   4rem;      /* 64 */\n  --space-10:  5rem;      /* 80 */\n  --space-12:  6rem;      /* 96 */\n  --space-16:  8rem;      /* 128 */\n  --space-20:  10rem;     /* 160 — aire de sección editorial */\n\n  /* Ritmo de sección recomendado */\n  --section-padding-y: var(--space-16);\n  --container-max:     1200px;\n  --container-narrow:  720px;   /* medida de lectura cómoda */\n  --gutter:            var(--space-6);\n\n  /* ---- Radios de esquina (refinados, no redondeados-burbuja) ---- */\n  --radius-none: 0;\n  --radius-xs:  2px;\n  --radius-sm:  4px;\n  --radius-md:  8px;     /* tarjetas, inputs */\n  --radius-lg:  12px;    /* paneles, contenedores */\n  --radius-xl:  20px;    /* superficies destacadas */\n  --radius-pill: 999px;  /* píldoras, avatares, botones cápsula */\n\n  /* ---- Bordes ---- */\n  --border-width-hair: 1px;\n  --border-width-thin: 1.5px;   /* trazo de marca (iconos / detalles) */\n  --border-width-med:  2px;\n\n  /* ---- Sombras (suaves, frías-neutras, nunca duras) ---- */\n  --shadow-none: none;\n  --shadow-xs:  0 1px 2px rgba(14, 42, 64, 0.05);\n  --shadow-sm:  0 2px 8px rgba(14, 42, 64, 0.06);\n  --shadow-md:  0 8px 24px rgba(14, 42, 64, 0.08);\n  --shadow-lg:  0 18px 48px rgba(14, 42, 64, 0.10);\n  --shadow-focus: 0 0 0 3px rgba(19, 138, 135, 0.28);\n\n  /* ---- Transiciones (calmas, sin rebotes) ---- */\n  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);  /* @kind other */\n  --ease-out:      cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */\n  --duration-fast:   140ms;  /* @kind other */\n  --duration-normal: 220ms;  /* @kind other */\n  --duration-slow:   400ms;  /* @kind other */\n\n  /* ---- Capas ---- */\n  --z-base: 0;        /* @kind other */\n  --z-sticky: 100;    /* @kind other */\n  --z-overlay: 1000;  /* @kind other */\n  --z-modal: 1100;    /* @kind other */\n  --z-toast: 1200;    /* @kind other */\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   ALURIA DIGITAL — BASE & HELPERS\n   Minimal element defaults + a few opt-in helper classes that\n   express the brand's type roles. Components use tokens directly.\n   ============================================================ */\n\n.aluria, .aluria-scope {\n  color: var(--text-body);\n  font-family: var(--font-body);\n  font-size: var(--text-base);\n  line-height: var(--leading-relaxed);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* ---- Type role helpers ---- */\n.al-eyebrow {\n  font-family: var(--font-label);\n  font-size: var(--text-xs);\n  font-weight: var(--weight-label-medium);\n  letter-spacing: var(--tracking-label);\n  text-transform: uppercase;\n  color: var(--text-accent);\n}\n.al-display {\n  font-family: var(--font-display);\n  font-weight: var(--weight-display-medium);\n  line-height: var(--leading-tight);\n  letter-spacing: var(--tracking-display);\n  color: var(--text-strong);\n}\n.al-display-italic { font-style: italic; font-weight: var(--weight-display-regular); }\n.al-heading {\n  font-family: var(--font-display);\n  font-weight: var(--weight-display-semibold);\n  line-height: var(--leading-snug);\n  color: var(--text-strong);\n}\n.al-lead {\n  font-family: var(--font-body);\n  font-size: var(--text-md);\n  font-weight: var(--weight-body-light);\n  line-height: var(--leading-relaxed);\n  color: var(--text-body);\n}\n.al-body { font-family: var(--font-body); line-height: var(--leading-relaxed); }\n.al-label {\n  font-family: var(--font-label);\n  font-weight: var(--weight-label-medium);\n  letter-spacing: var(--tracking-label);\n  text-transform: uppercase;\n  font-size: var(--text-xs);\n}\n\n/* ---- Brand graphic: the thin teal rule from \"DIGITAL\" ---- */\n.al-rule {\n  display: inline-flex;\n  align-items: center;\n  gap: var(--space-3);\n  color: var(--teal-aluria);\n}\n.al-rule::before, .al-rule::after {\n  content: \"\";\n  height: 1.5px;\n  width: var(--space-7);\n  background: currentColor;\n}\n\n/* ---- Focus visibility (accessibility is non-negotiable) ---- */\n.al-focusable:focus-visible {\n  outline: none;\n  box-shadow: var(--shadow-focus);\n  border-radius: var(--radius-sm);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   ALURIA DIGITAL — DESIGN SYSTEM\n   Entry point. Consumers link only this file.\n   Keep this as @import lines only — no rules here.\n   ============================================================ */\n\n/* ============================================================\n   ALURIA DIGITAL — WEBFONTS\n   All three families are served from Google Fonts.\n   Display : Cormorant Garamond  (titulares, citas, cifras)\n   Labels  : Jost                (eyebrows, navegación, datos)\n   Body/UI : Mulish              (párrafos, interfaz)\n   NOTE: loaded from the Google Fonts CDN (not self-hosted).\n   If offline/self-hosted binaries are required, swap these\n   @import lines for local @font-face rules + woff2 files.\n   ============================================================ */\n\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Cormorant Garamond';\n  font-style: italic;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"68d1fd1c-c56a-431b-99c5-ca398d0ea454\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Cormorant Garamond';\n  font-style: italic;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"aa3c6236-fa52-493e-a4f4-aee5824581d1\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Cormorant Garamond f6b42f-53a9-440c-afb5-08db6a0f70f2\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Mulish';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"8b9c7bee-fd94-43ec-9f3f-0d39c95fefd7\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Mulish';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"22585b44-abaf-4c86-9340-8f9a2aa7704f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Mulish';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"3b88f9e8-e98d-4757-8f39-d2dd814c3cfa\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Mulish';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"0b9b4f75-1312-4c0d-a648-fe3f4fbe757a\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Mulish';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"fcf6b42f-53a9-440c-afb5-08db6a0f70f2\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Mulish';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"8b9c7bee-fd94-43ec-9f3f-0d39c95fefd7\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Mulish';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"22585b44-abaf-4c86-9340-8f9a2aa7704f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ============================================================\n   ALURIA DIGITAL — COLOR TOKENS\n   Sólido siempre. Sin degradados. La elegancia viene del\n   espacio y el contraste, no de efectos.\n   Proporción de uso ≈ 60% blanco suave/arena · 25% navy · 15% turquesa\n   ============================================================ */\n\n:root {\n  /* ---- Primarios ---- */\n  --navy-midnight: #0E2A40;   /* Navy Medianoche — autoridad, base de texto/fondo */\n  --teal-aluria:   #138A87;   /* Turquesa Aluria — claridad, acento y acción */\n  --teal-light:    #3FC2B6;   /* Turquesa Claro — acentos sobre navy, detalles luminosos */\n\n  /* ---- Neutros cálidos ---- */\n  --soft-white:    #F8F6F1;   /* Blanco Suave — fondo principal */\n  --sand:          #E7DFD2;   /* Arena — superficies secundarias */\n  --stone:         #D8CDBC;   /* Piedra — bordes cálidos, divisores */\n  --warm-gray:     #A89F92;   /* Gris Cálido — texto terciario, metadatos */\n  --ink:           #1E2D36;   /* Tinta — texto sobre fondos claros */\n\n  /* ---- Escala navy (derivada para profundidad y estados) ---- */\n  --navy-900: #081B2A;\n  --navy-800: #0E2A40;   /* = navy-midnight */\n  --navy-700: #163850;\n  --navy-600: #234B66;\n  --navy-500: #335A78;\n\n  /* ---- Escala turquesa ---- */\n  --teal-700: #0F6F6C;\n  --teal-600: #138A87;   /* = teal-aluria */\n  --teal-500: #1FA39E;\n  --teal-400: #3FC2B6;   /* = teal-light */\n  --teal-200: #B8E6E0;\n  --teal-050: #E6F4F2;\n\n  /* ---- Escala arena/blanco ---- */\n  --paper-0:  #FFFFFF;\n  --paper-50: #FCFBF8;\n  --paper-100:#F8F6F1;   /* = soft-white */\n  --paper-200:#EFEAE0;\n  --paper-300:#E7DFD2;   /* = sand */\n  --paper-400:#D8CDBC;   /* = stone */\n  --paper-500:#C4B8A4;\n\n  /* ---- Semánticos / de estado ---- */\n  --color-success:  #2E7D6B;\n  --color-success-bg: #E6F4F0;\n  --color-warning:  #B8842E;\n  --color-warning-bg: #F7EFDF;\n  --color-danger:   #B0473E;\n  --color-danger-bg: #F6E7E4;\n  --color-info:     #138A87;\n  --color-info-bg:  #E6F4F2;\n\n  /* ============================================================\n     ALIASES SEMÁNTICOS — usar estos en componentes\n     ============================================================ */\n\n  /* Superficies */\n  --surface-page:     var(--soft-white);   /* fondo de página por defecto */\n  --surface-raised:   var(--paper-0);       /* tarjetas, paneles elevados */\n  --surface-sunken:   var(--sand);          /* secciones hundidas, bandas */\n  --surface-inverse:  var(--navy-midnight); /* bloques navy a contraste */\n  --surface-accent:   var(--teal-aluria);   /* superficies de acento */\n\n  /* Texto */\n  --text-strong:   var(--navy-midnight);    /* titulares */\n  --text-body:     var(--ink);              /* párrafos */\n  --text-muted:    var(--warm-gray);        /* metadatos, captions */\n  --text-on-dark:  var(--soft-white);       /* texto sobre navy/teal */\n  --text-on-dark-muted: #9DB2C0;            /* secundario sobre navy */\n  --text-accent:   var(--teal-aluria);      /* enlaces, énfasis de acción */\n  --text-accent-on-dark: var(--teal-light); /* acento sobre navy */\n\n  /* Bordes y divisores */\n  --border-soft:   var(--stone);            /* divisores cálidos sutiles */\n  --border-strong: var(--navy-midnight);    /* contornos definidos */\n  --border-accent: var(--teal-aluria);\n  --border-faint:  #EDE6DA;\n\n  /* Acciones */\n  --action-primary:        var(--navy-midnight);\n  --action-primary-hover:  var(--navy-700);\n  --action-primary-press:  var(--navy-900);\n  --action-accent:         var(--teal-aluria);\n  --action-accent-hover:   var(--teal-700);\n  --action-accent-press:   #0C5A57;\n\n  /* Focus */\n  --focus-ring: var(--teal-aluria);\n}\n\n/* ============================================================\n   ALURIA DIGITAL — TIPOGRAFÍA\n   Display : Cormorant Garamond — titulares, citas, cifras\n   Labels  : Jost — eyebrows, navegación, datos (tracking amplio)\n   Body/UI : Mulish — párrafos, interfaz\n   Carácter editorial del serif + claridad funcional en pantalla.\n   ============================================================ */\n\n:root {\n  /* ---- Familias ---- */\n  --font-display: 'Cormorant Garamond', 'Cormorant', Georgia, 'Times New Roman', serif;\n  --font-label:   'Jost', 'Futura', 'Century Gothic', system-ui, sans-serif;\n  --font-body:    'Mulish', system-ui, -apple-system, 'Segoe UI', sans-serif;\n\n  /* ---- Pesos ---- */\n  --weight-display-regular: 400;\n  --weight-display-medium:  500;\n  --weight-display-semibold:600;\n  --weight-display-bold:    700;\n  --weight-label-light:  300;\n  --weight-label-regular:400;\n  --weight-label-medium: 500;\n  --weight-label-semibold:600;\n  --weight-body-light:  300;\n  --weight-body-regular:400;\n  --weight-body-medium: 500;\n  --weight-body-semibold:600;\n  --weight-body-bold:   700;\n\n  /* ---- Escala tipográfica (rem, base 16px) ---- */\n  --text-2xs:  0.6875rem;  /* 11px — micro-labels */\n  --text-xs:   0.75rem;    /* 12px — eyebrows, captions */\n  --text-sm:   0.875rem;   /* 14px — UI secundaria */\n  --text-base: 1rem;       /* 16px — cuerpo */\n  --text-md:   1.125rem;   /* 18px — cuerpo destacado / lead */\n  --text-lg:   1.375rem;   /* 22px */\n  --text-xl:   1.75rem;    /* 28px */\n  --text-2xl:  2.25rem;    /* 36px */\n  --text-3xl:  3rem;       /* 48px */\n  --text-4xl:  3.75rem;    /* 60px */\n  --text-5xl:  4.75rem;    /* 76px — display hero */\n  --text-6xl:  6rem;       /* 96px — display XXL */\n\n  /* ---- Altura de línea ---- */\n  --leading-tight:   1.05;  /* titulares display grandes */\n  --leading-snug:    1.18;  /* titulares medios */\n  --leading-normal:  1.4;\n  --leading-relaxed: 1.65;  /* párrafos largos */\n\n  /* ---- Tracking ---- */\n  --tracking-display: -0.01em;  /* serif ligeramente cerrado */\n  --tracking-tight:   -0.02em;\n  --tracking-normal:  0;\n  --tracking-label:   0.16em;   /* eyebrows / Jost en mayúsculas */\n  --tracking-wide:    0.24em;   /* etiquetas muy espaciadas */\n\n  /* ============================================================\n     ROLES SEMÁNTICOS\n     ============================================================ */\n  --type-eyebrow-family: var(--font-label);\n  --type-eyebrow-size:   var(--text-xs);\n  --type-eyebrow-weight: var(--weight-label-medium);\n  --type-eyebrow-track:  var(--tracking-label);\n\n  --type-display-family: var(--font-display);\n  --type-display-weight: var(--weight-display-medium);\n  --type-display-leading:var(--leading-tight);\n\n  --type-heading-family: var(--font-display);\n  --type-heading-weight: var(--weight-display-semibold);\n\n  --type-body-family:    var(--font-body);\n  --type-body-size:      var(--text-base);\n  --type-body-leading:   var(--leading-relaxed);\n\n  --type-ui-family:      var(--font-body);\n  --type-ui-weight:      var(--weight-body-semibold);\n}\n\n/* ============================================================\n   ALURIA DIGITAL — ESPACIADO, RADIOS, SOMBRAS, BORDES\n   \"Jerarquía generosa. El espacio en blanco guía la mirada\n   y transmite calma.\" El espacio es parte del lujo.\n   ============================================================ */\n\n:root {\n  /* ---- Escala de espaciado (base 4px, generosa) ---- */\n  --space-0:   0;\n  --space-1:   0.25rem;   /* 4 */\n  --space-2:   0.5rem;    /* 8 */\n  --space-3:   0.75rem;   /* 12 */\n  --space-4:   1rem;      /* 16 */\n  --space-5:   1.5rem;    /* 24 */\n  --space-6:   2rem;      /* 32 */\n  --space-7:   2.5rem;    /* 40 */\n  --space-8:   3rem;      /* 48 */\n  --space-9:   4rem;      /* 64 */\n  --space-10:  5rem;      /* 80 */\n  --space-12:  6rem;      /* 96 */\n  --space-16:  8rem;      /* 128 */\n  --space-20:  10rem;     /* 160 — aire de sección editorial */\n\n  /* Ritmo de sección recomendado */\n  --section-padding-y: var(--space-16);\n  --container-max:     1200px;\n  --container-narrow:  720px;   /* medida de lectura cómoda */\n  --gutter:            var(--space-6);\n\n  /* ---- Radios de esquina (refinados, no redondeados-burbuja) ---- */\n  --radius-none: 0;\n  --radius-xs:  2px;\n  --radius-sm:  4px;\n  --radius-md:  8px;     /* tarjetas, inputs */\n  --radius-lg:  12px;    /* paneles, contenedores */\n  --radius-xl:  20px;    /* superficies destacadas */\n  --radius-pill: 999px;  /* píldoras, avatares, botones cápsula */\n\n  /* ---- Bordes ---- */\n  --border-width-hair: 1px;\n  --border-width-thin: 1.5px;   /* trazo de marca (iconos / detalles) */\n  --border-width-med:  2px;\n\n  /* ---- Sombras (suaves, frías-neutras, nunca duras) ---- */\n  --shadow-none: none;\n  --shadow-xs:  0 1px 2px rgba(14, 42, 64, 0.05);\n  --shadow-sm:  0 2px 8px rgba(14, 42, 64, 0.06);\n  --shadow-md:  0 8px 24px rgba(14, 42, 64, 0.08);\n  --shadow-lg:  0 18px 48px rgba(14, 42, 64, 0.10);\n  --shadow-focus: 0 0 0 3px rgba(19, 138, 135, 0.28);\n\n  /* ---- Transiciones (calmas, sin rebotes) ---- */\n  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);  /* @kind other */\n  --ease-out:      cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */\n  --duration-fast:   140ms;  /* @kind other */\n  --duration-normal: 220ms;  /* @kind other */\n  --duration-slow:   400ms;  /* @kind other */\n\n  /* ---- Capas ---- */\n  --z-base: 0;        /* @kind other */\n  --z-sticky: 100;    /* @kind other */\n  --z-overlay: 1000;  /* @kind other */\n  --z-modal: 1100;    /* @kind other */\n  --z-toast: 1200;    /* @kind other */\n}\n\n/* ============================================================\n   ALURIA DIGITAL — BASE & HELPERS\n   Minimal element defaults + a few opt-in helper classes that\n   express the brand's type roles. Components use tokens directly.\n   ============================================================ */\n\n.aluria, .aluria-scope {\n  color: var(--text-body);\n  font-family: var(--font-body);\n  font-size: var(--text-base);\n  line-height: var(--leading-relaxed);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* ---- Type role helpers ---- */\n.al-eyebrow {\n  font-family: var(--font-label);\n  font-size: var(--text-xs);\n  font-weight: var(--weight-label-medium);\n  letter-spacing: var(--tracking-label);\n  text-transform: uppercase;\n  color: var(--text-accent);\n}\n.al-display {\n  font-family: var(--font-display);\n  font-weight: var(--weight-display-medium);\n  line-height: var(--leading-tight);\n  letter-spacing: var(--tracking-display);\n  color: var(--text-strong);\n}\n.al-display-italic { font-style: italic; font-weight: var(--weight-display-regular); }\n.al-heading {\n  font-family: var(--font-display);\n  font-weight: var(--weight-display-semibold);\n  line-height: var(--leading-snug);\n  color: var(--text-strong);\n}\n.al-lead {\n  font-family: var(--font-body);\n  font-size: var(--text-md);\n  font-weight: var(--weight-body-light);\n  line-height: var(--leading-relaxed);\n  color: var(--text-body);\n}\n.al-body { font-family: var(--font-body); line-height: var(--leading-relaxed); }\n.al-label {\n  font-family: var(--font-label);\n  font-weight: var(--weight-label-medium);\n  letter-spacing: var(--tracking-label);\n  text-transform: uppercase;\n  font-size: var(--text-xs);\n}\n\n/* ---- Brand graphic: the thin teal rule from \"DIGITAL\" ---- */ ss and we'll get back to you within 24 hours.\",\n    contactCall: \"Call us\",\n    contactHours: \"We're available Monday to Friday. If you'd rather, leave the form and we'll reach out to you.\",\n    fName: \"Name\", phName: \"Your name\",\n    fBusiness: \"Business name\", phBusiness: \"Your business or brand\",\n    fEmail: \"Email\", phEmail: \"[email protected]\",\n    fBizType: \"Business type\", fService: \"Service of interest\",\n    fHasWeb: \"Do you currently have a website?\",\n    fMessage: \"Tell us about your project\", phMessage: \"Goals, timeline, and what you already have.\",\n    phChoose: \"Choose an option\",\n    bizTypeOptions: [\"Professional services\", \"Local business\", \"Health & wellness\", \"Retail / boutique\", \"Restaurant / café\", \"Other\"],\n    serviceOptions: [\"Strategy only\", \"Full website from scratch\", \"Audit & transformation\", \"Not sure yet\"],\n    hasWebOptions: [\"Yes, I have one\", \"No, starting from scratch\"],\n    fSubmit: \"Send request\",\n    formNote: \"No commitment. We reply within 24 hours.\",\n    successTitle: \"We got your request!\",\n    successBody: \"We'll write within 24 hours. If you'd like to move faster, call us at 787-324-7104.\",\n    footTag: \"More than beautiful. Built to work.\",\n    footExplore: \"Explore\",\n    footContact: \"Contact\",\n    footRights: \"Strategic web design\"\n  }\n};\n\nclass Component extends DCLogic {\n  state = {\n    lang: (this.props && this.props.defaultLang) || \"es\",\n    submitted: false,\n    openFaq: 0,\n    form: { name: \"\", business: \"\", email: \"\", bizType: \"\", service: \"\", hasWebsite: \"\", message: \"\" }\n  };\n\n  setField(k, v) { this.setState((s) => ({ form: { ...s.form, [k]: v } })); }\n  go(id) { window.location.hash = id; }\n  toggleFaq(i) { this.setState((s) => ({ openFaq: s.openFaq === i ? -1 : i })); }\n\n  renderVals() {\n    const t = TR[this.state.lang];\n    const f = this.state.form;\n    const services = t.services.map((s) => ({\n      ...s,\n      featClass: s.featured ? \"al-feat\" : \"\",\n      border: s.featured ? \"2px solid var(--teal-aluria)\" : \"1px solid var(--border-faint)\",\n      lift: s.featured ? \"translateY(-12px)\" : \"translateY(0)\"\n    }));\n    const whyPoints = t.why.map((w, i) => ({ ...w, icon: WHY_ICONS[i] }));\n    const faqs = t.faqs.map((q, i) => ({\n      ...q,\n      open: this.state.openFaq === i,\n      sign: this.state.openFaq === i ? \"–\" : \"+\",\n      onClick: () => this.toggleFaq(i)\n    }));\n    return {\n      t, f, services, whyPoints, faqs,\n      phone: (this.props && this.props.phone) || \"787-324-7104\",\n      isEs: this.state.lang === \"es\",\n      isEn: this.state.lang === \"en\",\n      submitted: this.state.submitted,\n      notSubmitted: !this.state.submitted,\n      selES: () => this.setState({ lang: \"es\" }),\n      selEN: () => this.setState({ lang: \"en\" }),\n      navContacto: () => this.go(\"contacto\"),\n      navServicios: () => this.go(\"servicios\"),\n      onName: (e) => this.setField(\"name\", e.target.value),\n      onBusiness: (e) => this.setField(\"business\", e.target.value),\n      onEmail: (e) => this.setField(\"email\", e.target.value),\n      onBizType: (e) => this.setField(\"bizType\", e.target.value),\n      onService: (e) => this.setField(\"service\", e.target.value),\n      onHasWebsite: (e) => this.setField(\"hasWebsite\", e.target.value),\n      onMessage: (e) => this.setField(\"message\", e.target.value),\n      onSubmit: () => {\n        const f = this.state.form;\n        const lang = this.state.lang;\n        const isEs = lang === 'es';\n        const subject = isEs\n          ? `Nueva solicitud de ${f.name || '(sin nombre)'} – ${f.business || '(sin negocio)'}`\n          : `New inquiry from ${f.name || '(no name)'} – ${f.business || '(no business)'}`;\n        const lines = isEs ? [\n          `NOMBRE: ${f.name}`,\n          `NEGOCIO: ${f.business}`,\n          `EMAIL: ${f.email}`,\n
